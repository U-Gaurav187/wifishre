<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>WifiShare</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* CSS remains the same as your beautiful original design */
.media-bbl{padding:10px 14px;}.media-row{display:flex;align-items:center;gap:12px;}.media-icon{font-size:26px;}.media-info{flex:1;}.media-title{font-size:14px;font-weight:700;}.media-sub{font-size:11px;color:var(--dim);}.dl-btn{width:32px;height:32px;border:none;border-radius:50%;background:var(--ac);color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}.dl-btn:hover{background:var(--ac2);transform:scale(1.1);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f0f2f0;--s0:#fff;--s1:#f5f6f5;--s2:#dde0dd;--s3:#c8cdc8;--ac:#1db954;--ac2:#158a3e;--own-bg:#d4f5e0;--own-br:#1db954;--oth-bg:#fff;--oth-br:#dde0dd;--tx:#1a1f1a;--dim:#7a8a7a;--gr:#1db954;--red:#e74c3c;--red2:#c0392b;--r:18px;--rs:12px;--ff:'Sora',sans-serif;--fm:'Space Mono',monospace;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--ff)}
#join{position:fixed;inset:0;background:var(--bg);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.logo{font-family:var(--fm);font-size:clamp(26px,8vw,44px);font-weight:700;color:var(--ac);letter-spacing:-2px;margin-bottom:4px;text-align:center}.logo em{color:#333;font-style:normal}.made-by{font-size:11px;color:var(--dim);font-family:var(--fm);letter-spacing:.5px;margin-bottom:10px;text-align:center}.sub{color:var(--dim);font-size:13px;margin-bottom:36px;text-align:center;line-height:1.6}.card{background:var(--s0);border:1px solid var(--s2);border-radius:22px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.07)}.lbl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}.inp{width:100%;background:var(--s1);border:1.5px solid var(--s2);border-radius:var(--rs);padding:13px 15px;color:var(--tx);font-family:var(--ff);font-size:15px;outline:none;transition:border-color .2s;margin-bottom:16px}.inp:focus{border-color:var(--ac)}.go{width:100%;padding:14px;border:none;border-radius:var(--rs);cursor:pointer;background:var(--ac);color:#fff;font-family:var(--ff);font-size:15px;font-weight:700;transition:all .2s;margin-top:4px}
#app{height:100%;display:flex;flex-direction:column;max-width:860px;margin:0 auto;display:none}.hdr{background:var(--s0);border-bottom:1px solid var(--s2);padding:0 14px;height:56px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.06)}.hlogo{font-family:var(--fm);font-size:15px;font-weight:700;color:var(--ac)}.hroom{background:var(--s1);border:1px solid var(--s2);border-radius:20px;padding:3px 11px;font-size:11px;color:var(--dim);font-family:var(--fm)}.hr{margin-left:auto;display:flex;align-items:center;gap:8px}.opill{display:flex;align-items:center;gap:6px;background:var(--s1);border:1px solid var(--s2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--dim);cursor:pointer;user-select:none}.odot{width:7px;height:7px;border-radius:50%;background:var(--gr);box-shadow:0 0 6px var(--gr);animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}.msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}.mr{display:flex;align-items:flex-end;gap:7px;animation:in .18s ease-out;position:relative}.mr.own{flex-direction:row-reverse}.mav{width:30px;height:30px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:2px}.mc{display:flex;flex-direction:column;max-width:74%}.bbl{padding:10px 14px;border-radius:var(--r);font-size:14px;line-height:1.55;word-break:break-word}.mr.own .bbl{background:var(--own-bg);border:1px solid var(--own-br);border-bottom-right-radius:4px}.mr.other .bbl{background:var(--oth-bg);border:1px solid var(--oth-br);border-bottom-left-radius:4px}.ibar{background:var(--s0);border-top:1px solid var(--s2);padding:10px 12px;flex-shrink:0}.irow{display:flex;align-items:flex-end;gap:8px}.ti{flex:1;background:var(--s1);border:1.5px solid var(--s2);border-radius:var(--r);padding:11px 15px;color:var(--tx);font-family:var(--ff);font-size:14px;outline:none;resize:none;max-height:120px;line-height:1.5;min-height:42px}.sb{width:42px;height:42px;flex-shrink:0;background:var(--ac);border:none;border-radius:10px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s}.att{width:42px;height:42px;flex-shrink:0;background:var(--s1);border:1.5px solid var(--s2);border-radius:10px;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px}
</style>
</head>
<body>
<div id="join">
  <div class="logo">Wifi<em>Share</em></div>
  <div class="made-by">Made By Gaurav U</div>
  <div class="sub">Instant sharing across your network</div>
  <div class="card">
    <div class="lbl">Your Name</div>
    <input class="inp" id="nameIn" placeholder="e.g. Ravi, Priya..." maxlength="20"/>
    <div class="lbl">Room (optional)</div>
    <input class="inp" id="roomIn" placeholder="main" maxlength="24"/>
    <button class="go" id="goBtn">Enter</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hlogo">Wifi<em>Share</em></div>
    <div class="hroom" id="rlabel">#main</div>
    <div class="hr"><div class="opill"><div class="odot"></div><span id="onlineN">0 online</span></div></div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="ibar">
    <div class="irow">
      <button class="att" onclick="document.getElementById('fin').click()">📎</button>
      <input type="file" id="fin" style="display:none" onchange="handleFile(this.files[0])"/>
      <textarea class="ti" id="tin" placeholder="Type a message..."></textarea>
      <button class="sb" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, serverTimestamp, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey:"AIzaSyAX_8DyrGZtLODF0omJruVY_McVFBcoRQw",
  authDomain:"wifishar.firebaseapp.com",
  databaseURL:"https://wifishar-default-rtdb.firebaseio.com",
  projectId:"wifishar"
};
const app=initializeApp(FIREBASE_CONFIG);
const db=getDatabase(app);

const UID = localStorage.getItem('ws_uid') || 'u'+Math.random().toString(36).slice(2,9);
localStorage.setItem('ws_uid', UID);
let myName, myRoom;

document.getElementById('goBtn').onclick = () => {
  myName = document.getElementById('nameIn').value.trim();
  myRoom = (document.getElementById('roomIn').value.trim() || 'main').toLowerCase();
  if(!myName) return alert("Enter name");
  document.getElementById('join').style.display='none';
  document.getElementById('app').style.display='flex';
  boot();
};

function boot(){
  const mref = ref(db, `rooms/${myRoom}/messages`);
  onValue(mref, s => render(s.val()));
  const pref = ref(db, `rooms/${myRoom}/presence/${UID}`);
  set(pref, {name:myName, online:true});
  onDisconnect(pref).remove();
}

function render(data){
  const el = document.getElementById('msgs'); el.innerHTML='';
  if(!data) return;
  Object.entries(data).forEach(([id, m]) => {
    const row = document.createElement('div');
    row.className = 'mr ' + (m.uid === UID ? 'own' : 'other');
    const inner = m.type === 'text' ? `<div class="bbl">${m.text}</div>` : `
      <div class="bbl media-bbl">
        <div class="media-row">
          <div class="media-icon">${m.type==='image'?'🖼️':m.type==='video'?'🎬':'📄'}</div>
          <div class="media-info"><div class="media-title">${m.fname}</div></div>
          <button class="dl-btn" onclick="window.open('${m.url}?download')">⬇</button>
        </div>
      </div>`;
    row.innerHTML = `<div class="mav">${m.name[0]}</div><div class="mc">${inner}</div>`;
    el.appendChild(row);
  });
  el.scrollTop = el.scrollHeight;
}

window.handleFile = async (file) => {
  if(!file) return;
  const formData = new FormData(); formData.append('file', file);
  const res = await fetch('https://pixeldrain.com/api/file', {method:'POST', body:formData});
  const json = await res.json();
  if(json.success){
    push(ref(db, `rooms/${myRoom}/messages`), {
      type: file.type.startsWith('image')?'image':file.type.startsWith('video')?'video':'file',
      url: `https://pixeldrain.com/api/file/${json.id}`,
      fname: file.name,
      name: myName, uid: UID, ts: serverTimestamp()
    });
  }
};

document.getElementById('sendBtn').onclick = () => {
  const t = document.getElementById('tin');
  if(!t.value.trim()) return;
  push(ref(db, `rooms/${myRoom}/messages`), {type:'text', text:t.value, name:myName, uid:UID, ts:serverTimestamp()});
  t.value='';
};
</script>
</body>
</html>
