<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>WifiShare</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root{--ac:#1db954;--bg:#f0f2f0;--tx:#1a1f1a;--dim:#7a8a7a;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Sora',sans-serif;}
  body{background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  #join{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;padding:32px;border-radius:28px;box-shadow:0 8px 32px rgba(0,0,0,0.08);width:100%;max-width:380px;text-align:center;}
  .inp{width:100%;padding:14px;margin:12px 0;border:1.5px solid #eee;border-radius:14px;outline:none;font-size:15px;background:#f9f9f9;}
  .go{width:100%;padding:16px;background:var(--ac);color:#fff;border:none;border-radius:14px;cursor:pointer;font-weight:700;font-size:16px;transition:0.2s;}
  .go:hover{background:#158a3e;}
  #app{display:none;flex-direction:column;height:100%;max-width:800px;margin:0 auto;width:100%;background:#fff;}
  .hdr{background:#fff;padding:16px;display:flex;align-items:center;border-bottom:1px solid #eee;gap:10px;}
  .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--bg);}
  .bbl{padding:12px 16px;border-radius:18px;max-width:85%;font-size:14px;line-height:1.5;position:relative;}
  .own{align-self:flex-end;background:#d4f5e0;border:1px solid #1db954;border-bottom-right-radius:4px;color:#0d3320;}
  .oth{align-self:flex-start;background:#fff;border:1px solid #eee;border-bottom-left-radius:4px;color:var(--tx);}
  .meta{font-size:10px;margin-top:4px;opacity:0.6;display:block;text-align:right;}
  .ibar{background:#fff;padding:12px;display:flex;gap:12px;align-items:center;border-top:1px solid #eee;}
  .ti{flex:1;padding:12px 18px;border:none;background:#f0f2f0;border-radius:24px;outline:none;}
  .dl-box{display:flex;align-items:center;gap:10px;padding:4px 0;}
  .dl-btn{background:var(--ac);color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;margin-top:5px;}
</style>
</head>
<body>
<div id="join">
  <div class="card">
    <h1 style="color:var(--ac);margin-bottom:4px;letter-spacing:-1px;">WifiShare</h1>
    <p style="color:var(--dim);font-size:12px;margin-bottom:24px;">Made by Gaurav U</p>
    <input class="inp" id="ni" placeholder="Your Name"/>
    <input class="inp" id="ri" placeholder="Room Name (optional)"/>
    <button class="go" id="jb">Connect to Network</button>
  </div>
</div>
<div id="app">
  <div class="hdr">
    <b style="color:var(--ac)" id="rl">#main</b>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px;background:#f0f2f0;padding:4px 12px;border-radius:20px;">
      <div style="width:8px;height:8px;background:var(--ac);border-radius:50%"></div>
      <span id="on" style="font-size:12px;font-weight:700;color:var(--dim)">0 Online</span>
    </div>
  </div>
  <div class="msgs" id="ms"></div>
  <div id="up-status" style="display:none;background:var(--ac);color:#fff;text-align:center;font-size:11px;padding:4px;">Uploading OG File...</div>
  <div class="ibar">
    <button style="background:#f0f2f0;border:none;font-size:20px;width:42px;height:42px;border-radius:50%;cursor:pointer;" onclick="document.getElementById('fi').click()">📎</button>
    <input type="file" id="fi" style="display:none" onchange="upload(this.files[0])"/>
    <input class="ti" id="ti" placeholder="Type a message..." onkeydown="if(event.key==='Enter')send()"/>
    <button class="go" style="width:42px;height:42px;padding:0;border-radius:50%;" id="sb" onclick="send()">➤</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const conf = { databaseURL: "https://wifishar-default-rtdb.firebaseio.com" };
const app = initializeApp(conf); const db = getDatabase(app);
const UID = 'u' + Math.random().toString(36).substring(2,8);
let myN, myR;

document.getElementById('jb').onclick = () => {
  myN = document.getElementById('ni').value.trim();
  myR = (document.getElementById('ri').value.trim() || 'main').toLowerCase().replace(/\s+/g,'-');
  if(!myN) return alert("Enter name");
  document.getElementById('join').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('rl').innerText = '#'+myR;
  startChat();
};

function startChat(){
  const mref = ref(db, `rooms/${myR}/messages`);
  onValue(mref, s => {
    const el = document.getElementById('ms'); el.innerHTML = '';
    const data = s.val(); if(!data) return;
    Object.values(data).forEach(m => {
      const d = document.createElement('div'); d.className = 'bbl ' + (m.uid===UID?'own':'oth');
      const time = new Date(m.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      if(m.type==='text'){
        d.innerHTML = `${m.text}<span class="meta">${time}</span>`;
      } else {
        d.innerHTML = `<div class="dl-box">📦 <b>${m.fname}</b></div><a href="${m.url}" target="_blank" class="dl-btn">DOWNLOAD FILE</a><span class="meta">${time}</span>`;
      }
      el.appendChild(d);
    }); el.scrollTop = el.scrollHeight;
  });
  const pref = ref(db, `rooms/${myR}/presence/${UID}`); set(pref, {name:myN, online:true}); onDisconnect(pref).remove();
  onValue(ref(db, `rooms/${myR}/presence`), s => {
    const count = s.exists() ? Object.keys(s.val()).length : 0;
    document.getElementById('on').innerText = count + ' Online';
  });
}

window.send = () => {
  const t = document.getElementById('ti'); if(!t.value.trim()) return;
  push(ref(db, `rooms/${myR}/messages`), {name:myN, text:t.value, uid:UID, type:'text', ts:Date.now(), color:'#1db954'});
  t.value='';
};

window.upload = async (f) => {
  if(!f) return;
  const bar = document.getElementById('up-status'); bar.style.display='block';
  const fd = new FormData(); fd.append('file', f);
  try {
    const res = await fetch('https://pixeldrain.com/api/file', {method:'POST', body:fd});
    const j = await res.json();
    if(j.success) push(ref(db, `rooms/${myR}/messages`), {
      name:myN, fname:f.name, uid:UID, type:'file', ts:Date.now(), url:`https://pixeldrain.com/api/file/${j.id}`
    });
  } catch(e) { alert("Upload Failed"); }
  bar.style.display='none';
};
</script>
</body>
</html>
