<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>WifiShare</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, serverTimestamp, set, onDisconnect }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAX_8DyrGZtLODF0omJruVY_McVFBcoRQw",
  authDomain:        "wifishar.firebaseapp.com",
  databaseURL:       "https://wifishar-default-rtdb.firebaseio.com",
  projectId:         "wifishar",
  storageBucket:     "wifishar.firebasestorage.app",
  messagingSenderId: "701545429608",
  appId:             "1:701545429608:web:682b39cafde45a887fd9dd"
};

const app      = initializeApp(FIREBASE_CONFIG);
window._db     = getDatabase(app);
window._ref    = ref;
window._push   = push;
window._onVal  = onValue;
window._ts     = serverTimestamp;
window._set    = set;
window._od     = onDisconnect;
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f2f0;
  --s0:#ffffff;
  --s1:#f5f6f5;
  --s2:#dde0dd;
  --s3:#c8cdc8;
  --ac:#1db954;
  --ac2:#158a3e;
  --own-bg:#d4f5e0;
  --own-br:#1db954;
  --oth-bg:#ffffff;
  --oth-br:#dde0dd;
  --tx:#1a1f1a;
  --dim:#7a8a7a;
  --gr:#1db954;
  --r:18px;--rs:12px;
  --ff:'Sora',sans-serif;--fm:'Space Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--ff)}

/* JOIN */
#join{
  position:fixed;inset:0;background:var(--bg);z-index:900;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  overflow-y:auto;
}
.glow{
  position:absolute;top:25%;left:50%;transform:translate(-50%,-50%);
  width:500px;height:500px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(29,185,84,.08) 0%,transparent 70%);
}
.logo{
  font-family:var(--fm);font-size:clamp(26px,8vw,44px);font-weight:700;
  color:var(--ac);letter-spacing:-2px;margin-bottom:6px;text-align:center;
}
.logo em{color:#333;font-style:normal}
.sub{color:var(--dim);font-size:13px;margin-bottom:36px;text-align:center;line-height:1.6}
.card{
  background:var(--s0);border:1px solid var(--s2);border-radius:22px;
  padding:28px 24px;width:100%;max-width:380px;
  box-shadow:0 4px 24px rgba(0,0,0,.07);
}
.lbl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:7px}
.inp{
  width:100%;background:var(--s1);border:1.5px solid var(--s2);border-radius:var(--rs);
  padding:13px 15px;color:var(--tx);font-family:var(--ff);font-size:15px;
  outline:none;transition:border-color .2s;margin-bottom:16px;
}
.inp:focus{border-color:var(--ac)}
.go{
  width:100%;padding:14px;border:none;border-radius:var(--rs);cursor:pointer;
  background:var(--ac);color:#fff;font-family:var(--ff);font-size:15px;
  font-weight:700;letter-spacing:.3px;transition:all .2s;margin-top:4px;
}
.go:hover{background:var(--ac2);transform:translateY(-1px)}
.go:active{transform:translateY(0)}
.err{
  background:#fff0f0;border:1px solid #ffbbbb;border-radius:10px;
  padding:10px 14px;color:#c0392b;font-size:12px;margin-top:12px;display:none;line-height:1.5;
}
.hint{font-size:11px;color:var(--dim);text-align:center;margin-top:18px;line-height:1.8}
.hint b{color:var(--ac)}

/* APP */
#app{height:100%;display:flex;flex-direction:column;max-width:860px;margin:0 auto;display:none}

/* Header */
.hdr{
  background:var(--s0);border-bottom:1px solid var(--s2);
  padding:0 14px;height:56px;display:flex;align-items:center;gap:10px;
  flex-shrink:0;position:relative;z-index:10;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.hlogo{font-family:var(--fm);font-size:15px;font-weight:700;color:var(--ac)}
.hlogo em{color:#333;font-style:normal}
.hroom{
  background:var(--s1);border:1px solid var(--s2);border-radius:20px;
  padding:3px 11px;font-size:11px;color:var(--dim);font-family:var(--fm);
}
.hr{margin-left:auto;display:flex;align-items:center;gap:8px}
.opill{
  display:flex;align-items:center;gap:6px;background:var(--s1);
  border:1px solid var(--s2);border-radius:20px;padding:5px 12px;
  font-size:12px;color:var(--dim);cursor:pointer;transition:all .2s;user-select:none;
}
.opill:hover{border-color:var(--gr);color:var(--ac)}
.odot{
  width:7px;height:7px;border-radius:50%;background:var(--gr);
  box-shadow:0 0 6px var(--gr);animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* Users panel */
.upanel{
  position:absolute;top:60px;right:12px;background:var(--s0);
  border:1px solid var(--s2);border-radius:14px;padding:12px;
  min-width:165px;z-index:200;box-shadow:0 6px 24px rgba(0,0,0,.1);display:none;
}
.upanel.open{display:block}
.uptitle{font-size:10px;color:var(--dim);font-weight:700;
  text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.ui{display:flex;align-items:center;gap:8px;padding:5px 0}
.uav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.uname{font-size:13px;color:var(--tx)}
.uyou{font-size:10px;color:var(--ac);margin-left:auto;font-weight:600}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--dim);gap:8px;text-align:center;padding:32px}
.eicon{font-size:48px;opacity:.3}

/* Bubbles */
.mr{display:flex;align-items:flex-end;gap:7px;animation:in .18s ease-out}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mr.own{flex-direction:row-reverse}
.mav{width:30px;height:30px;border-radius:50%;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:2px}
.mc{display:flex;flex-direction:column;max-width:72%}
.mr.own .mc{align-items:flex-end}
.mn{font-size:11px;color:var(--dim);margin-bottom:3px;font-weight:500}
.bbl{
  padding:10px 14px;border-radius:var(--r);font-size:14px;line-height:1.55;
  word-break:break-word;
}
.mr.own  .bbl{
  background:var(--own-bg);border:1px solid var(--own-br);
  border-bottom-right-radius:4px;color:#0d3320;
}
.mr.other .bbl{
  background:var(--oth-bg);border:1px solid var(--oth-br);
  border-bottom-left-radius:4px;color:var(--tx);
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.mt{font-size:10px;color:var(--dim);margin-top:3px;font-family:var(--fm)}

/* Images */
.mimg{max-width:100%;max-height:260px;object-fit:cover;border-radius:12px;
  display:block;cursor:zoom-in;border:1px solid var(--s2)}

/* Typing */
.tybar{height:26px;display:flex;align-items:center;gap:8px;
  padding:0 14px;font-size:12px;color:var(--dim);flex-shrink:0;background:var(--bg)}
.td{display:flex;gap:3px}
.td span{width:5px;height:5px;border-radius:50%;background:var(--s3);
  animation:db .9s infinite}
.td span:nth-child(2){animation-delay:.15s}
.td span:nth-child(3){animation-delay:.3s}
@keyframes db{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* Input bar */
.ibar{background:var(--s0);border-top:1px solid var(--s2);padding:10px 12px;flex-shrink:0}
.pvs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.pv{position:relative;width:62px;height:62px;border-radius:10px;
  overflow:hidden;border:1px solid var(--s2)}
.pv img{width:100%;height:100%;object-fit:cover}
.pvrm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.5);
  border:none;border-radius:50%;width:18px;height:18px;color:#fff;
  cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.prog{background:var(--s1);border-radius:4px;height:3px;overflow:hidden;margin-bottom:8px;display:none}
.pbar{height:100%;background:var(--ac);transition:width .3s;width:0}
.irow{display:flex;align-items:flex-end;gap:8px}
.att{
  width:42px;height:42px;flex-shrink:0;background:var(--s1);
  border:1.5px solid var(--s2);border-radius:10px;color:var(--dim);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all .2s;position:relative;
}
.att:hover{border-color:var(--ac);color:var(--ac)}
.att input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ti{
  flex:1;background:var(--s1);border:1.5px solid var(--s2);border-radius:var(--r);
  padding:11px 15px;color:var(--tx);font-family:var(--ff);font-size:14px;
  outline:none;resize:none;max-height:120px;line-height:1.5;
  transition:border-color .2s;min-height:42px;
}
.ti:focus{border-color:var(--ac)}
.ti::placeholder{color:var(--dim)}
.sb{
  width:42px;height:42px;flex-shrink:0;background:var(--ac);border:none;
  border-radius:10px;color:#fff;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:20px;font-weight:900;transition:all .2s;
}
.sb:hover{background:var(--ac2);transform:scale(1.05)}
.sb:active{transform:scale(.94)}

/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;
  display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lb.open{display:flex}
.lb img{max-width:96vw;max-height:96vh;border-radius:12px;object-fit:contain}

/* Toast */
.toast{
  position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--tx);color:#fff;border-radius:12px;
  padding:9px 18px;font-size:13px;z-index:9999;
  opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;
  white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.15);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:680px){
  #app{border-left:1px solid var(--s2);border-right:1px solid var(--s2)}
  .mc{max-width:60%}
}
</style>
</head>
<body>

<!-- JOIN -->
<div id="join">
  <div class="glow"></div>
  <div class="logo">Wifi<em>Share</em></div>
  <div class="sub">Instant sharing across your network</div>

  <div class="card">
    <div class="lbl">Your Name</div>
    <input class="inp" id="nameIn" placeholder="e.g. Ravi, Priya, Phone 1…"
      maxlength="20" autocomplete="off" onkeydown="if(event.key==='Enter')go()"/>

    <div class="lbl" style="margin-top:2px">
      Room &nbsp;<span style="color:var(--dim);text-transform:none;font-weight:400;letter-spacing:0">(optional)</span>
    </div>
    <input class="inp" id="roomIn" placeholder="main"
      maxlength="24" autocomplete="off" onkeydown="if(event.key==='Enter')go()"/>

    <button class="go" onclick="go()">Enter ➤</button>
    <div class="err" id="err"></div>
  </div>

  <div class="hint">
    Everyone who opens this file is connected automatically.<br/>
    <b>Your messages = green &nbsp;·&nbsp; Others = white</b>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <div class="hlogo">Wifi<em>Share</em></div>
    <div class="hroom" id="rlabel">#main</div>
    <div class="hr">
      <div class="opill" onclick="togglePanel()">
        <div class="odot"></div>
        <span id="onlineN">0 online</span>
      </div>
    </div>
    <div class="upanel" id="upanel">
      <div class="uptitle">Online Now</div>
      <div id="ulist"></div>
    </div>
  </div>

  <div class="msgs" id="msgs">
    <div class="empty" id="empty">
      <div class="eicon">📡</div>
      <div style="font-weight:600;color:#333">You're connected!</div>
      <div style="font-size:12px;margin-top:4px">Send a message — others will see it instantly</div>
    </div>
  </div>

  <div class="tybar" id="tybar"></div>

  <div class="ibar">
    <div class="pvs" id="pvs"></div>
    <div class="prog" id="prog"><div class="pbar" id="pbar"></div></div>
    <div class="irow">
      <div class="att" title="Send image">
        📷
        <input type="file" accept="image/*" multiple onchange="addImgs(this.files)" onclick="this.value=''"/>
      </div>
      <textarea class="ti" id="tin" placeholder="Type a message…" rows="1"
        onkeydown="kdn(event)" oninput="rsz(this);onTyping()"></textarea>
      <button class="sb" onclick="send()">➤</button>
    </div>
  </div>
</div>

<div class="lb" id="lb" onclick="this.classList.remove('open')">
  <img id="lbimg" src="" alt=""/>
</div>
<div class="toast" id="toast"></div>

<script>
const UID = localStorage.getItem('ws_uid') || (()=>{
  const id='u'+Math.random().toString(36).slice(2,9);
  localStorage.setItem('ws_uid',id); return id;
})();

const PAL=['#1db954','#2e7d32','#e67e22','#e74c3c','#8e44ad','#2980b9','#16a085','#d35400'];
const myColor=PAL[Math.abs([...UID].reduce((a,c)=>a+c.charCodeAt(0),0))%PAL.length];
let myName='',myRoom='main';
let pendingImgs=[],typTimer=null,isTyping=false;
let stopAll=()=>{};
const rendered=new Set();

window.addEventListener('load',()=>{
  const n=localStorage.getItem('ws_name'); if(n)document.getElementById('nameIn').value=n;
  const r=localStorage.getItem('ws_room'); if(r)document.getElementById('roomIn').value=r;
  document.getElementById('nameIn').focus();
});

function go(){
  const name=document.getElementById('nameIn').value.trim();
  if(!name){showErr('Please enter your name');return;}
  myName=name;
  myRoom=(document.getElementById('roomIn').value.trim()||'main')
    .toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  localStorage.setItem('ws_name',myName);
  localStorage.setItem('ws_room',myRoom);
  document.getElementById('join').style.display='none';
  const a=document.getElementById('app');
  a.style.display='flex'; a.style.flexDirection='column';
  document.getElementById('rlabel').textContent='#'+myRoom;
  boot();
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block';}

function boot(){
  const db=window._db;
  const mref=window._ref(db,`rooms/${myRoom}/messages`);
  const pref=window._ref(db,`rooms/${myRoom}/presence/${UID}`);
  const tref=window._ref(db,`rooms/${myRoom}/typing/${UID}`);
  window._set(pref,{name:myName,color:myColor,online:true,ts:window._ts()});
  window._od(pref).remove();
  window._od(tref).remove();
  const s1=window._onVal(mref,              s=>renderMsgs(s.val()));
  const s2=window._onVal(window._ref(db,`rooms/${myRoom}/presence`),s=>renderPres(s.val()));
  const s3=window._onVal(window._ref(db,`rooms/${myRoom}/typing`),  s=>renderTyp(s.val()));
  stopAll=()=>{s1();s2();s3();window._set(pref,null);window._set(tref,null);};
  window.addEventListener('beforeunload',stopAll);
}

function renderMsgs(data){
  const w=document.getElementById('msgs');
  document.getElementById('empty').style.display=(!data||!Object.keys(data).length)?'flex':'none';
  if(!data)return;
  const atBot=w.scrollHeight-w.scrollTop-w.clientHeight<120;
  Object.entries(data)
    .sort((a,b)=>(a[1].ts||0)-(b[1].ts||0))
    .forEach(([id,msg])=>{
      if(rendered.has(id))return;
      rendered.add(id);
      w.appendChild(mkBubble(id,msg,msg.uid===UID));
    });
  if(atBot)w.scrollTop=w.scrollHeight;
}

function mkBubble(id,msg,own){
  const row=document.createElement('div');
  row.className='mr '+(own?'own':'other');
  row.dataset.id=id;
  const c=msg.color||'#1db954';
  const av=(msg.name||'?')[0].toUpperCase();
  const ts=msg.ts?new Date(msg.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';

  let inner='';
  if(msg.type==='text'){
    inner=`<div class="bbl">${esc(msg.text||'').replace(/\n/g,'<br/>')}</div>`;
  } else if(msg.type==='image'){
    inner=`<div class="bbl" style="padding:4px">
      <img class="mimg" src="${msg.data}" alt="image" onclick="showLb('${msg.data}')"/>
    </div>`;
  }

  row.innerHTML=`
    <div class="mav" style="background:${c}22;color:${c};border:1.5px solid ${c}55">${av}</div>
    <div class="mc">
      ${!own?`<div class="mn">${esc(msg.name||'')}</div>`:''}
      ${inner}
      <div class="mt">${ts}</div>
    </div>`;
  return row;
}

function renderPres(data){
  const cn=document.getElementById('onlineN'),ul=document.getElementById('ulist');
  if(!data){cn.textContent='0 online';ul.innerHTML='';return;}
  const users=Object.entries(data).filter(([,u])=>u&&u.online);
  cn.textContent=users.length+' online';
  ul.innerHTML=users.map(([uid,u])=>`
    <div class="ui">
      <div class="uav" style="background:${u.color}22;color:${u.color};border:1.5px solid ${u.color}44">
        ${(u.name||'?')[0].toUpperCase()}</div>
      <div class="uname">${esc(u.name||'')}</div>
      ${uid===UID?'<div class="uyou">you</div>':''}
    </div>`).join('');
}
function togglePanel(){document.getElementById('upanel').classList.toggle('open');}
document.addEventListener('click',e=>{
  const p=document.getElementById('upanel');
  if(p&&!p.contains(e.target)&&!e.target.closest('.opill'))p.classList.remove('open');
});

function renderTyp(data){
  const el=document.getElementById('tybar');
  if(!data){el.innerHTML='';return;}
  const t=Object.entries(data).filter(([uid,v])=>uid!==UID&&v);
  if(!t.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="td"><span></span><span></span><span></span></div>
    <span>${esc(t.map(([,v])=>v).join(', '))} ${t.length===1?'is':'are'} typing…</span>`;
}
function onTyping(){
  const tr=window._ref(window._db,`rooms/${myRoom}/typing/${UID}`);
  if(!isTyping){isTyping=true;window._set(tr,myName);}
  clearTimeout(typTimer);
  typTimer=setTimeout(()=>{isTyping=false;window._set(tr,null);},2000);
}

async function send(){
  const inp=document.getElementById('tin');
  const txt=inp.value.trim();
  if(!txt&&!pendingImgs.length)return;
  const mr=window._ref(window._db,`rooms/${myRoom}/messages`);
  if(txt){
    inp.value=''; rsz(inp);
    window._push(mr,{type:'text',text:txt,name:myName,uid:UID,color:myColor,ts:window._ts()});
  }
  if(pendingImgs.length){
    const imgs=[...pendingImgs]; pendingImgs=[]; renderPvs();
    document.getElementById('prog').style.display='block';
    for(let i=0;i<imgs.length;i++){
      document.getElementById('pbar').style.width=((i/imgs.length)*100)+'%';
      await sendImage(imgs[i],mr);
    }
    document.getElementById('pbar').style.width='100%';
    setTimeout(()=>{document.getElementById('prog').style.display='none';
      document.getElementById('pbar').style.width='0%';},400);
  }
  isTyping=false; clearTimeout(typTimer);
  window._set(window._ref(window._db,`rooms/${myRoom}/typing/${UID}`),null);
  document.getElementById('msgs').scrollTop=999999;
}

function sendImage(file,mr){
  return new Promise(res=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=900;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*MAX/w);w=MAX;}
        else{w=Math.round(w*MAX/h);h=MAX;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const data=canvas.toDataURL('image/jpeg',0.72);
      URL.revokeObjectURL(url);
      window._push(mr,{type:'image',data,name:myName,uid:UID,color:myColor,ts:window._ts()});
      res();
    };
    img.onerror=()=>{toast('Could not read image');res();};
    img.src=url;
  });
}

function addImgs(files){
  for(const f of files){
    if(!f.type.startsWith('image/')){toast('Only images supported');continue;}
    if(f.size>8*1024*1024){toast('Max 8MB per image');continue;}
    pendingImgs.push(f);
  }
  renderPvs();
}
function renderPvs(){
  const w=document.getElementById('pvs'); w.innerHTML='';
  pendingImgs.forEach((f,i)=>{
    const d=document.createElement('div');d.className='pv';
    d.innerHTML=`<img src="${URL.createObjectURL(f)}"/>
      <button class="pvrm" onclick="rmImg(${i})">✕</button>`;
    w.appendChild(d);
  });
}
function rmImg(i){pendingImgs.splice(i,1);renderPvs();}

function kdn(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function rsz(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showLb(src){document.getElementById('lbimg').src=src;document.getElementById('lb').classList.add('open');}
function toast(m,d=3500){const e=document.getElementById('toast');
  e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),d);}
</script>
</body>
</html>
